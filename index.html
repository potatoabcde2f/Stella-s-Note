    <style>
      body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; color: #fff; overflow: hidden; }
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #121212; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #555; }
      .pattern-grid {
        background-image: radial-gradient(#333 1px, transparent 1px);
        background-size: 20px 20px;
      }
      .font-playfair { font-family: 'Playfair Display', serif; }
      .font-mono { font-family: 'JetBrains Mono', monospace; }
      .font-hand { font-family: 'Caveat', cursive; }
      
      /* Markdown Styles */
      .md-content ul { list-style-type: disc; padding-left: 1.5em; }
      .md-content ol { list-style-type: decimal; padding-left: 1.5em; }
      .md-content li { margin-bottom: 0.25em; }
      .md-content blockquote { border-left: 3px solid #00FF9D; padding-left: 1em; color: #aaa; }
      .md-content code { background: rgba(255,255,255,0.1); padding: 0.1em 0.3em; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }
      .md-content pre { background: rgba(0,0,0,0.3); padding: 0.5em; border-radius: 5px; overflow-x: auto; }
