<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <title>Stella's Note</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,500;1,600&family=JetBrains+Mono:wght@400&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * { font-family: 'Inter', sans-serif; }
      body { background-color: #000; color: #fff; overflow: hidden; margin: 0; }
      .font-playfair { font-family: 'Playfair Display', serif; }
      .font-mono { font-family: 'JetBrains Mono', monospace; }
      .font-hand { font-family: 'Caveat', cursive; }

      @keyframes heroReveal { 0%{opacity:0;transform:translateY(28px);filter:blur(12px)} 100%{opacity:1;transform:translateY(0);filter:blur(0)} }
      @keyframes heroFadeUp { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }
      @keyframes heroZoom { 0%{transform:scale(1.12)} 100%{transform:scale(1)} }
      .hero-anim { opacity:0; animation-fill-mode:forwards; animation-timing-function:cubic-bezier(0.16,1,0.3,1); }
      .hero-reveal { animation-name:heroReveal; animation-duration:1.1s; }
      .hero-fade { animation-name:heroFadeUp; animation-duration:1s; }
      .hero-zoom { animation:heroZoom 1.8s cubic-bezier(0.16,1,0.3,1) forwards; }
      @media (prefers-reduced-motion: reduce){ .hero-anim,.hero-zoom{ animation:none; opacity:1; } }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #121212; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #555; }
      .pattern-grid { background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }

      .md-content ul { list-style-type: disc; padding-left: 1.5em; }
      .md-content ol { list-style-type: decimal; padding-left: 1.5em; }
      .md-content li { margin-bottom: 0.25em; }
      .md-content blockquote { border-left: 3px solid #00FF9D; padding-left: 1em; color: #aaa; }
      .md-content code { background: rgba(255,255,255,0.1); padding: 0.1em 0.3em; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }
      .md-content pre { background: rgba(0,0,0,0.3); padding: 0.5em; border-radius: 5px; overflow-x: auto; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "@supabase/supabase-js": "https://aistudiocdn.com/@supabase/supabase-js@^2.87.0"
  }
}
</script>
</head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
